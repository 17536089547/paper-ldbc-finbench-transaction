############################################################
endpoint=bolt://127.0.0.1:7687
user=admin
password=admin
graphName=sf10
queryDir=queries
############################################################
#                    Driver configurations                 #
############################################################
status=1
thread_count=32
name=LDBC-FinBench
# Modes available: 1.CREATE_VALIDATION 2.VALIDATE_DATABASE 3.EXECUTE_BENCHMARK
mode=EXECUTE_BENCHMARK
status_display_interval=3000

results_log=true
time_unit=MICROSECONDS
time_compression_ratio=1
peer_identifiers=
workload_statistics=false
spinner_wait_duration=1
help=false
ignore_scheduled_start_times=false
workload=org.graphybench.driver.driver.workloads.transaction.GraphyBenchTransactionWorkload
db=org.graphybench.impls.galaxybase.GalaxybaseDb
operation_count=200000
validation_parameters_size=10000
validate_workload=false
validate_database=validation_params.csv
warmup=50000
#graphybench.transaction.queries.parameters_dir=data/read_params
#graphybench.transaction.queries.updates_dir=data/incremental
graphybench.transaction.queries.parameters_dir=/home/tianjiaxin/graph/data/sf10/params
graphybench.transaction.queries.updates_dir=/home/tianjiaxin/graph/data/sf10/incremental
# param and update files suffix, `csv` or `parquet`, default is `csv`
graphybench.transaction.queries.files_suffix=csv
graphybench.transaction.queries.simple_read_dissipation=0.2
graphybench.transaction.queries.update_interleave=500
graphybench.transaction.queries.scale_factor=1
